<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

   <h:head>
      <title>Nuosavybių sąrašas</title>
   </h:head>
   <h:body>
      <h2>Savininkai ir jų nuosavybės</h2>

      <h:dataTable value="#{propertyBean.owners}" var="owner" border="1">
         <h:column>
            <f:facet name="header">Savininko vardas</f:facet>
            #{owner.name}
         </h:column>
         <h:column>
            <f:facet name="header">Nuosavybės</f:facet>
            <ui:repeat value="#{owner.properties}" var="property">
               <h:outputText value="#{property.address} - #{property.price}€" /><br/>
            </ui:repeat>
         </h:column>
      </h:dataTable>

      <h:link value="Pridėti naują nuosavybę" outcome="new-property.xhtml" />
   </h:body>

</html>
